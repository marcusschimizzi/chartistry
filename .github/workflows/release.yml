name: Release

on:
  push:
    branches: [main]

# Don't let two release runs publish at once.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push the version-packages PR / tags
  pull-requests: write # open the version-packages PR
  id-token: write # npm provenance via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    # The job is inert until an NPM_TOKEN secret is configured, so it never
    # fails red before publishing is set up. Add the secret to switch it on.
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR while changesets are pending; once
      # that PR merges (no pending changesets), publishes the new versions.
      - name: Create release PR or publish
        if: ${{ env.NPM_TOKEN != '' }}
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
